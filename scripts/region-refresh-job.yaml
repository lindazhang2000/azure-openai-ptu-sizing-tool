## Azure Container Apps Job that refreshes region_data.json daily and uploads it
## to Blob Storage. Create/update with:
##   az containerapp job create -n ptu-region-refresh -g ptu-sizing-rg --yaml scripts/region-refresh-job.yaml
## The job authenticates with its system-assigned managed identity (no secrets).
location: westus2
identity:
  type: SystemAssigned
properties:
  environmentId: /subscriptions/6fb2ee67-1d5a-4a8a-9a7f-f7fc97f6f205/resourceGroups/ptu-sizing-rg/providers/Microsoft.App/managedEnvironments/ptu-refresh-env
  configuration:
    triggerType: Schedule
    replicaTimeout: 1800
    replicaRetryLimit: 1
    scheduleTriggerConfig:
      cronExpression: "0 6 * * *"
      parallelism: 1
      replicaCompletionCount: 1
  template:
    containers:
      - name: refresh
        image: mcr.microsoft.com/azure-cli
        resources:
          cpu: 1.0
          memory: 2.0Gi
        command:
          - /bin/sh
        args:
          - -c
          - |
            set -e
            az login --identity --allow-no-subscriptions
            az account set -s 6fb2ee67-1d5a-4a8a-9a7f-f7fc97f6f205
            python3 -c "import urllib.request; urllib.request.urlretrieve('https://raw.githubusercontent.com/lindazhang2000/azure-openai-ptu-sizing-tool/main/scripts/refresh_regions.py', '/tmp/refresh_regions.py')"
            python3 /tmp/refresh_regions.py --workers 6 --output /tmp/region_data.json
            az storage blob upload \
              --account-name pturegiondata38537 \
              --auth-mode login \
              -c region-data \
              -n region_data.json \
              -f /tmp/region_data.json \
              --overwrite
